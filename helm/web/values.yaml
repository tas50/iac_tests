replicaCount: 2

image:
  repository: nginx
  tag: "1.27.3"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Secure-by-default pod/container hardening. Flip these to test scanner
# findings (e.g. privileged: true, readOnlyRootFilesystem: false).
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
